name: Docker Build and Push

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]

env:
  REGISTRY: docker.io
  IMAGE_PREFIX: signin

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Docker Hub
      if: github.event_name != 'pull_request'
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: |
          ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_PREFIX }}-auth
          ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_PREFIX }}-app
          ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_PREFIX }}-sync

    - name: Build and push Auth Service
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile
        target: auth-service
        push: ${{ github.event_name != 'pull_request' }}
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_PREFIX }}-auth:latest
          ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_PREFIX }}-auth:${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Build and push Signin Service
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile
        target: signin-service
        push: ${{ github.event_name != 'pull_request' }}
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_PREFIX }}-app:latest
          ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_PREFIX }}-app:${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Build and push Sync Service
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile
        target: sync-service
        push: ${{ github.event_name != 'pull_request' }}
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_PREFIX }}-sync:latest
          ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_PREFIX }}-sync:${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Generate SBOM
      uses: anchore/sbom-action@v0
      with:
        image: ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_PREFIX }}-app:latest
        format: spdx-json
        output-file: sbom.spdx.json

    - name: Upload SBOM
      uses: actions/upload-artifact@v4
      with:
        name: sbom
        path: sbom.spdx.json

  # 部署到服务器（可选）
  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    
    steps:
    - name: Deploy to server
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        script: |
          cd /opt/signin-system
          docker-compose pull
          docker-compose up -d
          docker-compose ps
          docker system prune -f
