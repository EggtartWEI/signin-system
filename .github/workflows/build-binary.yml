name: Build Binary

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-20.04
    
    steps:
    - uses: actions/checkout@v4
      
    - uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        
    - name: Install PyInstaller
      run: |
        pip install pyinstaller
        pip install -r login/requirements.txt
        
    - name: Build main server
      run: |
        pyinstaller --onefile --name signin-server \
          --add-data "index.html:." \
          --add-data "script.js:." \
          --add-data "styles.css:." \
          --add-data "logo.png:." \
          server_with_auth.py
        
    - name: Build auth service
      working-directory: ./login
      run: |
        pyinstaller --onefile --name signin-auth \
          --add-data "external_users.json:." \
          --add-data "login_page.html:." \
          attendance_login_only.py
        
    - name: Package
      run: |
        mkdir -p release/signin-system
        cp dist/signin-server release/signin-system/
        cp login/dist/signin-auth release/signin-system/
        cp data.json mode.json release/signin-system/
        cp -r login release/signin-system/
        
        # Create simple start script
        echo '#!/bin/bash' > release/signin-system/start.sh
        echo 'cd "$(dirname "$0")"' >> release/signin-system/start.sh
        echo './signin-auth & sleep 3' >> release/signin-system/start.sh
        echo './signin-server' >> release/signin-system/start.sh
        chmod +x release/signin-system/start.sh
        
        cd release && tar czf signin-system.tar.gz signin-system
        
    - uses: actions/upload-artifact@v4
      with:
        name: binary
        path: release/signin-system.tar.gz
