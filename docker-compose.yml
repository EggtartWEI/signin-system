version: '3.8'

services:
  # 认证服务
  auth-service:
    build:
      context: .
      dockerfile: Dockerfile
      target: auth-service
    image: ${DOCKER_USERNAME}/signin-auth:${VERSION:-latest}
    container_name: signin-auth
    ports:
      - "8001:8001"
    volumes:
      - ./login/external_users.json:/app/external_users.json
      - ./login/data:/app/data
      - ./logs/auth:/app/logs
    environment:
      - LOG_DIR=/app/logs
      - TZ=Asia/Shanghai
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  # 签到系统
  signin-service:
    build:
      context: .
      dockerfile: Dockerfile
      target: signin-service
    image: ${DOCKER_USERNAME}/signin-app:${VERSION:-latest}
    container_name: signin-app
    ports:
      - "3000:3000"
    volumes:
      - ./data.json:/app/data.json
      - ./mode.json:/app/mode.json
      - ./logs/app:/app/logs
    environment:
      - TZ=Asia/Shanghai
      - AUTH_SERVICE_URL=http://auth-service:8001
    depends_on:
      - auth-service
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  # 定时同步服务
  sync-service:
    build:
      context: .
      dockerfile: Dockerfile
      target: sync-service
    image: ${DOCKER_USERNAME}/signin-sync:${VERSION:-latest}
    container_name: signin-sync
    volumes:
      - ./data.json:/app/data.json
      - ./logs/sync:/var/log
    environment:
      - TZ=Asia/Shanghai
    depends_on:
      - signin-service
    restart: unless-stopped

  # Nginx 反向代理（可选）
  nginx:
    image: nginx:alpine
    container_name: signin-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/ssl:/etc/nginx/ssl
    depends_on:
      - auth-service
      - signin-service
    restart: unless-stopped

# 数据卷
volumes:
  signin-data:
  signin-logs:

# 网络
networks:
  default:
    name: signin-network
