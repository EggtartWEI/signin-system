version: '3.8'

services:
  signin-system:
    # 使用 GitHub Container Registry
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER:-yourusername}/signin-system:latest
    container_name: signin-system
    restart: unless-stopped
    ports:
      - "3000:3000"    # 签到系统
      - "8001:8001"    # 认证服务
    volumes:
      # 数据持久化
      - ./data:/app/data
      - ./data.json:/app/data.json
      - ./mode.json:/app/mode.json
      - ./login/external_users.json:/app/login/external_users.json
      # 日志
      - ./logs:/app/logs
      - ./login/logs:/app/login/logs
      # 备份
      - ./backup:/app/backup
    environment:
      - TZ=Asia/Shanghai
      - LOG_DIR=/app/logs
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - signin-network

  # 可选：使用 Nginx 作为反向代理
  nginx:
    image: nginx:alpine
    container_name: signin-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./logs/nginx:/var/log/nginx
    depends_on:
      - signin-system
    networks:
      - signin-network
    profiles:
      - with-nginx

networks:
  signin-network:
    driver: bridge
